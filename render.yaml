services:
  - type: web
    name: ocorrencias
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DATABASE_URL
        fromDatabase:
          name: ocorrencias-db
          property: connectionString

databases:
  - name: ocorrencias-db
    plan: free
    databaseName: ocorrencias
    user: ocorrencias
